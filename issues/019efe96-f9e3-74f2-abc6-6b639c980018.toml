title = "Evaluate ref alias files for merge-time conflict detection"
body = "Investigate tracking user-visible refs as ordinary Git paths, ideally symlinks from ref names to UUID-named issue files, so duplicate refs force an explicit merge conflict resolution. Consider portability concerns such as Windows/core.symlinks and compare symlinks with small ref pointer files that preserve the same conflict behaviour."
