ref = "gitrack-gby"
title = "Remove generated help subcommand"
body = """
Problem
Clap currently exposes both `gitrack <command> --help` and a generated `gitrack help <command>` subcommand. That creates two equivalent navigation paths and is confusing.

Agreed plan
1. Disable clap's generated `help` subcommand at the root command so the setting propagates to nested commands.
2. Keep `-h` and `--help` flags available.
3. Add CLI tests that assert the visible `help` command disappears and `--help` still works for root and nested commands.

Estimated implementation size
- CLI attribute change: 1-3 LOC.
- Tests: 10-20 LOC.
- Total expected change: below 50 LOC."""
