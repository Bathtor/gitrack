title = "Check licenses on CI"
body = """
Run the existing cargo-deny licence policy in CI so licence checks cannot be missed on pull requests.

G1. Keep the change on main; no task branch for this small workflow update.
G2. Add a dedicated linux-licenses job to .github/workflows/pr-linux.yml.
G3. Use EmbarkStudios/cargo-deny-action@v2 with stable Rust and command `check licenses`.
G4. Keep the job in the existing pr-linux workflow so it runs on pull_request, push to main, and workflow_dispatch.
G5. Validate with cargo-deny check licenses and git diff --check.
G6. Commit and push directly to main after validation."""
