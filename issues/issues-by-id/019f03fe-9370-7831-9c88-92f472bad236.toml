title = "Sort list and ready by priority and update time"
body = """
Change gitrack list and gitrack ready to order results by priority first, then by last updated time, with deterministic tie-breakers so human and JSON output remain stable.

Agreed plan:
A1. Add a shared ordering helper for list-like command output.
A2. Sort by priority ascending, then updated_at descending, then ref and UUID as deterministic tie-breakers.
A3. Apply the helper to both gitrack list and gitrack ready so human and JSON output match.
A4. Add CLI tests covering list and ready ordering.
A5. Validate with rustfmt, tests, clippy, and git diff --check."""
