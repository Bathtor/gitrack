title = "Implement unified link and unlink CLI"
body = """
Parent epic: gitrack-fl8

Implement the unified relationship command surface.

Scope:
- Make `gitrack link <source> <target>` the primary relationship creation command.
- Support mutually exclusive `--child`, `--blocked-by`, and `--label <label>` relationship selectors.
- Default free-form label to `relates to` if no selector is supplied, if still agreed at implementation time.
- Add `--bidirectional` for free-form links as shorthand for creating both one-way links.
- Add `gitrack unlink <source> <target>` with matching selector flags.
- Remove `gitrack block` from the public command surface.

Depends on: gitrack-fl8.1 relationship schema and validation."""
