id = "019efeae-5394-75f3-b2aa-eb0ae20bf441"
ref = "gitrack-wxk"
title = "Improve human-readable output formatting"
body = """
Explore and implement clearer human-readable output formatting for human CLI output while keeping JSON output unchanged and deterministic.

Agreed plan:
A1. Improve colour and structure together. The highest-value areas are colours, indentation, compact headers, section headlines, and emphasis.
A2. Use lscolors as the colour source so gitrack respects existing terminal/user preferences where possible. Add a small HumanPalette abstraction rather than scattering colour logic through formatting code.
A3. Proposed lscolors semantic mapping:
- issue refs: SymbolicLink
- primary titles/headlines: Directory
- open status: RegularFile/default
- in-progress status: ExecutableFile
- closed status: muted/default or MissingFile only if it reads well in practice
- P0/P1 priority: Setuid or Capabilities
- blocked/unresolved dependency: OrphanedSymbolicLink
- labels/type chips: Socket or FIFO
- UUIDs/timestamps/low-value metadata: muted/default
- section headings: Directory style with compact uppercase headings
A4. For list and ready, keep one issue per line but make it denser and easier to scan, e.g. '<status-glyph> gitrack-wxk  Improve human-readable output formatting  [P3 · IN-PROGRESS · task · codex]'.
A5. Use the agreed non-beads status glyph set: open '□', in-progress '◆', closed '✓', blocked '!'.
A6. For show, switch to a compact bd-inspired layout with a header carrying ref/type/title/priority/status, a metadata line for owner/type/status_reason/timestamps, then clear sections such as DESCRIPTION, BLOCKERS, and COMMENTS.
A7. Omit empty sections. Comments should be divider-separated blocks rather than bullet list entries so multi-line notes stand alone.
A8. Human output only in this task. JSON output structs and field order remain unchanged.
A9. Honour NO_COLOR and only emit colour when stdout is a terminal. Tests should cover uncoloured layout and deterministic colour behaviour with controlled environment where practical.
A10. Expected implementation size is under 1000 LOC: roughly 80-130 LOC for colour wrapper, 150-250 LOC for formatting, 120-220 LOC for tests, and small docs/help updates if needed."""
