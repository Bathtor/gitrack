id = "019f048b-d322-7fe3-996d-ef0d890df4ad"
ref = "gitrack-fl8.5"
title = "Harden relationship ref and merge edge cases"
body = """
Parent epic: gitrack-fl8

Harden edge cases around UUID-backed relationships, ref renames, and merge conflicts.

Scope:
- Test that ref renames do not rewrite relationship fields.
- Test that JSON/human output resolves relationship UUIDs to the latest refs.
- Test mirrored relationship inconsistencies fail clearly during load.
- Test merge/conflict-like states around relationship fields where practical.
- Ensure diagnostics tell users which issue and relationship field needs repair.

Depends on: gitrack-fl8.1 schema and gitrack-fl8.2 CLI.

Proposed plan:
P1. Add CLI coverage that creates parent/child, blocked_by/blocks, and labelled-link relationships, renames one or more refs with gitrack ref, and asserts the underlying relationship fields still store the same UUIDs without rewriting dependent issue files.
P2. Extend output coverage so JSON and human show/list views resolve relationship UUIDs to the latest refs after a rename, including nested list output introduced by gitrack-fl8.6.
P3. Add store-level negative tests for mirrored relationship inconsistencies that check the structured error variant and verify the diagnostic includes the source issue, relationship field, target UUID, and expected target field.
P4. Add a practical merge-like fixture for relationship fields if it can be done without excessive git-test complexity: create divergent edits to mirrored relationship fields and verify gitrack load/list fails loudly until repaired.
P5. If P4 becomes too large, split the full real-merge harness into a follow-up and keep this slice to deterministic file-level conflict/corruption tests.
P6. Avoid changing relationship semantics unless tests expose an actual bug; this is primarily a hardening and diagnostics slice.
P7. Run cargo fmt --all --check, cargo test -- --test-threads=1, clippy pedantic, cargo-deny check licenses, and git diff --check.

Estimated size:
E1. Ref-rename relationship tests: 120-220 LOC.
E2. Output resolution tests: 80-160 LOC.
E3. Store diagnostics tests and any message tightening: 120-220 LOC.
E4. Merge-like fixture, if included: 120-260 LOC.
E5. Total expected change: 320-860 LOC if P4 stays focused; split P4 if it pushes the slice near 1000 LOC."""
