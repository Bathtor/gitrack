title = "Add README and user guide"
body = """
Document installation, storage layout, common command examples, JSON mode, ready semantics, ref aliases, and agent-friendly workflows in a README or equivalent user guide.

Agreed plan:
A1. Add README.md covering overview, quick start through install.sh, gitrack init, common command examples, storage layout, JSON mode, ready semantics, refs, symlink aliases, and generated AGENTS guidance commands.
A2. Avoid duplicating the detailed agent workflow in README.md; refer readers to gitrack agents update and gitrack agents update --with-workflow.
A3. License the project as GPL-2.0-or-later, including Cargo metadata and a top-level licence file.
A4. Add CONTRIBUTING.md with inbound-equals-outbound terms and DCO sign-off expectations.
A5. Add deny.toml using the agreed cargo-deny license allow-list and confidence threshold.
A6. Install/run cargo-deny and validate docs/config changes before moving the issue to review."""
