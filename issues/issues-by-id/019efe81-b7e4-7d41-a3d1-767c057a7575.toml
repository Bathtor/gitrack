ref = "gitrack-mw6"
title = "Introduce domain newtypes for issue metadata"
body = """
Problem
Replace raw strings for issue refs, issue kinds, and configured issue directories with domain types that own validation and make invalid states harder to construct. Statuses are already represented as `IssueStatus`, so this task keeps that enum as-is.

Agreed plan
1. Introduce persisted domain newtypes in `model.rs`: `IssueRef` for issue refs and config `ref_prefix`, `IssueKind` for issue `type` and config `default_type`, and `IssueDir` for config `issue_dir`.
2. Move validation ownership into those types: `IssueRef::parse(...)`, `IssueKind::parse(...)`, and `IssueDir::parse(...)`.
3. Keep TOML and JSON shapes unchanged by serialising/deserialising newtypes as plain strings.
4. Update store, commands, and views to use `.as_str()` or `Display` at string boundaries, while CLI arguments remain raw strings until parsed.
5. Add focused tests for invalid refs, issue dirs, and issue kinds, and keep existing CLI/store behaviour intact.

Estimated implementation size
- Newtypes and serde impls: 120-180 LOC.
- Store/command/view adaptations: 150-250 LOC.
- Tests: 100-180 LOC.
- Total expected change: 370-610 LOC, below the 1000 LOC split threshold."""
