body = "Implemented and tested merge-time ref-clash recovery. Added a real Git integration smoke test that creates two branches with the same issue ref, observes the symlink add/add merge conflict, verifies ordinary list output reports the duplicate ref with UUID recovery guidance, resolves one side through gitrack ref <uuid> <new-ref>, confirms dependent issue TOML is unchanged, verifies dependency lookup follows the renamed ref by UUID, stages the resolved files, and completes the merge commit. Added a narrow relaxed issue loader used by UUID-targeted gitrack ref repair only. Updated README ref-clash guidance. Validation passed: cargo fmt --all --check; cargo test -- --test-threads=1; cargo clippy --workspace --all-targets --no-deps --locked -- -D warnings -W clippy::pedantic; git diff --check."
