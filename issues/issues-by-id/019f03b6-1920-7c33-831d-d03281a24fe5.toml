ref = "gitrack-s1d"
title = "Test merge-time ref clash resolution"
body = """
Exercise gitrack ref during a real Git merge conflict/ref-clash scenario. Verify that resolving a user-visible ref clash through the CLI updates the ref symlink and issue ref field without rewriting dependency UUIDs. Cover actual merge-state behaviour, document the recommended flow for agents and humans, and avoid documenting manual symlink edits as the normal resolution path.

Agreed plan:
A1. Add a Rust integration smoke test that uses a real Git repository, not a fake .git directory.
A2. The test should initialise gitrack, commit base state, create branches that introduce a ref clash through ordinary tracked issue files, and merge to observe actual Git conflict behaviour.
A3. The expected resolution flow should use gitrack ref, preferably by UUID when the user-visible ref is ambiguous.
A4. Verify dependency links remain UUID-based and are not rewritten when a clashing ref is renamed.
A5. If current gitrack ref cannot run in the duplicate-ref/conflicted state, add the smallest targeted support needed and improve the recovery guidance.
A6. Validate with rustfmt, tests, clippy, and git diff --check."""
