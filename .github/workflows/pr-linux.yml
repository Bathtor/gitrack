name: pr-linux

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: pr-linux-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

jobs:
    linux-style:
        name: linux-style
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Install stable Rust for formatting and clippy
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2

            - name: Check formatting
              run: cargo fmt --all --check

            - name: Run clippy
              run: cargo clippy --workspace --all-targets --no-deps --locked -- -D warnings -W clippy::pedantic

    linux-tests:
        name: linux-tests
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Install stable Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2

            - name: Run workspace tests
              run: cargo test --workspace --locked

    linux-licenses:
        name: linux-licenses
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Check dependency licences
              uses: EmbarkStudios/cargo-deny-action@v2
              with:
                  rust-version: stable
                  command: check licenses
